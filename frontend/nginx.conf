server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Any route that doesn't have a file extension (e.g. /about) is routed to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API requests to backend
    # This avoids CORS issues if the frontend and backend are served on the same domain
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
